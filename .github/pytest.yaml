name: Run Pytest

on:
  push:
    branches:
      - main # Or your main branch
  pull_request:
    branches:
      - main # Or your main branch

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Install your package in editable mode. if you have a requirements.txt file use pip install -r requirements.txt
          pip install pytest pytest-cov #install pytest and coverage

      - name: Run pytest with coverage
        run: pytest --cov=./ --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3 #optional, uploads coverage to codecov.io
        with:
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: true